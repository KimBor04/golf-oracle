name: API Backfill

on:
  schedule:
    # Daily automatic near-future field update.
    - cron: "0 6 * * *"

    # Daily automatic completed-results backfill.
    - cron: "0 7 * * *"

jobs:
  api-backfill:
    name: Run quota-safe API backfill
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      FREEWEBAPI_GOLF_API_KEY: ${{ secrets.RAPIDAPI_KEY }}
      FREEWEBAPI_GOLF_API_HOST: ${{ secrets.RAPIDAPI_HOST }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve backfill configuration
        run: |
          if [ "${{ github.event.schedule }}" = "0 6 * * *" ]; then
            echo "BACKFILL_YEAR=2026" >> "$GITHUB_ENV"
            echo "BACKFILL_MODE=fields" >> "$GITHUB_ENV"
            echo "BACKFILL_MAX_API_CALLS=2" >> "$GITHUB_ENV"
            echo "BACKFILL_NEXT_EVENTS=3" >> "$GITHUB_ENV"
            echo "BACKFILL_FIELD_LOOKAHEAD_DAYS=7" >> "$GITHUB_ENV"
            echo "BACKFILL_DESCRIPTION=Fetches near-future tournament fields for 2026" >> "$GITHUB_ENV"
          elif [ "${{ github.event.schedule }}" = "0 7 * * *" ]; then
            echo "BACKFILL_YEAR=2026" >> "$GITHUB_ENV"
            echo "BACKFILL_MODE=results" >> "$GITHUB_ENV"
            echo "BACKFILL_MAX_API_CALLS=8" >> "$GITHUB_ENV"
            echo "BACKFILL_NEXT_EVENTS=3" >> "$GITHUB_ENV"
            echo "BACKFILL_FIELD_LOOKAHEAD_DAYS=7" >> "$GITHUB_ENV"
            echo "BACKFILL_DESCRIPTION=Fetches completed tournament results for 2026" >> "$GITHUB_ENV"
          else
            echo "Unknown schedule: ${{ github.event.schedule }}"
            exit 1
          fi

      - name: Restore previous API cache and artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            features/api_cache/
            features/api_schedule_*.parquet
            features/api_target_tournaments_*.parquet
            features/api_results_*.parquet
            features/api_fields_*.parquet
            features/live_features.parquet
          key: api-backfill-${{ runner.os }}-${{ env.BACKFILL_YEAR }}-${{ env.BACKFILL_MODE }}-${{ github.run_id }}
          restore-keys: |
            api-backfill-${{ runner.os }}-${{ env.BACKFILL_YEAR }}-
            api-backfill-${{ runner.os }}-

      - name: Show restored API artifacts
        run: |
          echo "Restored API artifacts before backfill:"
          find features -maxdepth 2 -type f | sort || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate API secrets
        run: |
          if [ -z "$FREEWEBAPI_GOLF_API_KEY" ]; then
            echo "FREEWEBAPI_GOLF_API_KEY secret is missing."
            exit 1
          fi

          if [ -z "$FREEWEBAPI_GOLF_API_HOST" ]; then
            echo "FREEWEBAPI_GOLF_API_HOST secret is missing."
            exit 1
          fi

      - name: Show resolved backfill configuration
        run: |
          echo "Description: $BACKFILL_DESCRIPTION"
          echo "Year: $BACKFILL_YEAR"
          echo "Mode: $BACKFILL_MODE"
          echo "Max API calls: $BACKFILL_MAX_API_CALLS"
          echo "Next events: $BACKFILL_NEXT_EVENTS"
          echo "Field lookahead days: $BACKFILL_FIELD_LOOKAHEAD_DAYS"

      - name: Run fields backfill
        if: ${{ env.BACKFILL_MODE == 'fields' }}
        run: |
          python pipelines/freewebapi_backfill.py \
            --year "$BACKFILL_YEAR" \
            --mode fields \
            --next-events "$BACKFILL_NEXT_EVENTS" \
            --field-lookahead-days "$BACKFILL_FIELD_LOOKAHEAD_DAYS" \
            --max-api-calls "$BACKFILL_MAX_API_CALLS"

      - name: Run results backfill
        if: ${{ env.BACKFILL_MODE == 'results' }}
        run: |
          python pipelines/freewebapi_backfill.py \
            --year "$BACKFILL_YEAR" \
            --mode results \
            --max-api-calls "$BACKFILL_MAX_API_CALLS"

      - name: Show generated API artifacts
        run: |
          echo "Generated API artifacts after backfill:"
          find features -maxdepth 2 -type f | sort || true

      - name: Save updated API cache and artifacts
        if: ${{ success() }}
        uses: actions/cache/save@v4
        with:
          path: |
            features/api_cache/
            features/api_schedule_*.parquet
            features/api_target_tournaments_*.parquet
            features/api_results_*.parquet
            features/api_fields_*.parquet
            features/live_features.parquet
          key: api-backfill-${{ runner.os }}-${{ env.BACKFILL_YEAR }}-${{ env.BACKFILL_MODE }}-${{ github.run_id }}

      - name: Upload API backfill artifacts
        uses: actions/upload-artifact@v4
        with:
          name: api-backfill-${{ env.BACKFILL_MODE }}-${{ env.BACKFILL_YEAR }}-${{ github.run_id }}
          path: |
            features/api_schedule_*.parquet
            features/api_target_tournaments_*.parquet
            features/api_results_*.parquet
            features/api_fields_*.parquet
            features/live_features.parquet
            features/api_cache/
          if-no-files-found: warn
          retention-days: 14