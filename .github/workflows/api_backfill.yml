name: API Backfill

on:
  workflow_dispatch:
    inputs:
      year:
        description: "Season year to backfill"
        required: true
        default: "2026"
      mode:
        description: "Backfill mode: schedule, fields, or results"
        required: true
        default: "fields"
        type: choice
        options:
          - schedule
          - fields
          - results
      max_api_calls:
        description: "Maximum API calls for this run"
        required: true
        default: "2"
      next_events:
        description: "Number of upcoming events to check in fields mode"
        required: true
        default: "3"
      field_lookahead_days:
        description: "Only check fields for tournaments starting within this many days"
        required: true
        default: "7"

jobs:
  api-backfill:
    name: Run quota-safe API backfill
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      FREEWEBAPI_GOLF_API_KEY: ${{ secrets.RAPIDAPI_KEY }}
      FREEWEBAPI_GOLF_API_HOST: ${{ secrets.RAPIDAPI_HOST }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate API secrets
        run: |
          if [ -z "$FREEWEBAPI_GOLF_API_KEY" ]; then
            echo "FREEWEBAPI_GOLF_API_KEY secret is missing."
            exit 1
          fi

          if [ -z "$FREEWEBAPI_GOLF_API_HOST" ]; then
            echo "FREEWEBAPI_GOLF_API_HOST secret is missing."
            exit 1
          fi

      - name: Run schedule backfill
        if: ${{ github.event.inputs.mode == 'schedule' }}
        run: |
          python pipelines/freewebapi_backfill.py \
            --year "${{ github.event.inputs.year }}" \
            --mode schedule \
            --max-api-calls "${{ github.event.inputs.max_api_calls }}"

      - name: Run fields backfill
        if: ${{ github.event.inputs.mode == 'fields' }}
        run: |
          python pipelines/freewebapi_backfill.py \
            --year "${{ github.event.inputs.year }}" \
            --mode fields \
            --next-events "${{ github.event.inputs.next_events }}" \
            --field-lookahead-days "${{ github.event.inputs.field_lookahead_days }}" \
            --max-api-calls "${{ github.event.inputs.max_api_calls }}"

      - name: Run results backfill
        if: ${{ github.event.inputs.mode == 'results' }}
        run: |
          python pipelines/freewebapi_backfill.py \
            --year "${{ github.event.inputs.year }}" \
            --mode results \
            --max-api-calls "${{ github.event.inputs.max_api_calls }}"

      - name: Show generated API artifacts
        run: |
          echo "Generated feature artifacts:"
          find features -maxdepth 2 -type f | sort || true

      - name: Upload API backfill artifacts
        uses: actions/upload-artifact@v4
        with:
          name: api-backfill-${{ github.event.inputs.mode }}-${{ github.event.inputs.year }}-${{ github.run_id }}
          path: |
            features/api_schedule_*.parquet
            features/api_target_tournaments_*.parquet
            features/api_results_*.parquet
            features/api_fields_*.parquet
            features/live_features.parquet
            features/api_cache/
          if-no-files-found: warn
          retention-days: 14